name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest pytest-cov tiktoken
      - name: Compile check
        run: python -m py_compile zoom_meeting_manager.py
      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=zoom_meeting_manager --cov-report=term-missing
